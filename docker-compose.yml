services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      GITHUB_PRIVATE_KEY: ${GITHUB_PRIVATE_KEY:-}
      GITHUB_PRIVATE_KEY_PATH: ${GITHUB_PRIVATE_KEY_PATH:-}
      GITHUB_APP_SLUG: ${GITHUB_APP_SLUG:-patchwork-ai}
      ACTIVE_PROMPT_VERSION: ${ACTIVE_PROMPT_VERSION:-v2}
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: sqlite+aiosqlite:///data/patchwork.db
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8080}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://localhost:5173}
    ports:
      - "8000:8000"
    volumes:
      - patchwork_data:/app/data
    depends_on:
      - redis

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      GITHUB_PRIVATE_KEY: ${GITHUB_PRIVATE_KEY:-}
      GITHUB_PRIVATE_KEY_PATH: ${GITHUB_PRIVATE_KEY_PATH:-}
      GITHUB_APP_SLUG: ${GITHUB_APP_SLUG:-patchwork-ai}
      ACTIVE_PROMPT_VERSION: ${ACTIVE_PROMPT_VERSION:-v2}
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: sqlite+aiosqlite:///data/patchwork.db
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8080}
    volumes:
      - patchwork_data:/app/data
    depends_on:
      - redis

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ""
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  redis_data:
  patchwork_data:
